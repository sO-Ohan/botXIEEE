# IK solver configuration.
#
# The arm has only 5 revolute joints, so it CANNOT reach an arbitrary
# 6-D pose (position + full orientation). position_only_ik makes KDL
# solve for the 3-D position of tool0 and ignore orientation, which is
# the practical choice for 5-DOF hobby arms.
arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
  position_only_ik: true
